<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Home / X</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { background:#000; color:#e7e9ea;
    font-family:system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    font-size:15px; }
  button { font-family:inherit; }
  .app { display:flex; justify-content:center; min-height:100vh; }

  /* ---- left nav rail ---- */
  .nav-rail { width:260px; padding:8px 12px; display:flex; flex-direction:column;
    position:sticky; top:0; height:100vh; }
  .nav-logo { width:50px; height:50px; border-radius:9999px; display:flex;
    align-items:center; justify-content:center; }
  .nav-logo svg { width:28px; height:28px; fill:#e7e9ea; }
  .nav-item { display:flex; align-items:center; gap:16px; padding:12px;
    border-radius:9999px; color:#e7e9ea; text-decoration:none; font-size:20px;
    width:fit-content; }
  .nav-item:hover { background:#181818; }
  .nav-item svg { width:26px; height:26px; fill:#e7e9ea; }
  .nav-item.active { font-weight:700; }
  .btn-post { margin-top:16px; background:#1d9bf0; color:#fff; border:none;
    border-radius:9999px; font-size:17px; font-weight:700; padding:14px 0;
    width:90%; cursor:pointer; }
  .btn-post:hover { background:#1a8cd8; }

  /* ---- center column ---- */
  .timeline { width:600px; min-height:100vh;
    border-left:1px solid #2f3336; border-right:1px solid #2f3336; }
  .home-header { position:sticky; top:0; z-index:10;
    background:rgba(0,0,0,0.85); backdrop-filter:blur(8px);
    padding:14px 16px; font-size:20px; font-weight:700;
    border-bottom:1px solid #2f3336; }

  /* compose box */
  .compose { display:flex; gap:12px; padding:14px 16px;
    border-bottom:1px solid #2f3336; }
  .avatar { width:40px; height:40px; border-radius:9999px; flex:none;
    display:flex; align-items:center; justify-content:center;
    color:#fff; font-weight:700; font-size:18px; }
  .compose-body { flex:1; }
  .compose textarea { width:100%; background:transparent; border:none;
    resize:none; color:#e7e9ea; font-size:20px; font-family:inherit;
    outline:none; padding:8px 0; min-height:52px; }
  .compose textarea::placeholder { color:#71767b; }
  .compose-actions { display:flex; justify-content:flex-end;
    border-top:1px solid #2f3336; padding-top:10px; }
  .compose-actions button { background:#1d9bf0; color:#fff; border:none;
    border-radius:9999px; font-size:15px; font-weight:700;
    padding:8px 18px; cursor:pointer; }
  .compose-actions button:disabled { opacity:0.5; cursor:default; }

  /* tweet cards */
  .tweet { display:flex; gap:12px; padding:12px 16px;
    border-bottom:1px solid #2f3336; }
  .tweet:hover { background:#080808; }
  .tweet-main { flex:1; min-width:0; }
  .tweet-head { display:flex; gap:4px; align-items:baseline; flex-wrap:wrap; }
  .tweet-name { font-weight:700; color:#e7e9ea; }
  .tweet-meta { color:#71767b; }
  .tweet-text { margin-top:2px; white-space:pre-wrap; word-wrap:break-word;
    line-height:1.35; }
  .tweet-actions { display:flex; justify-content:space-between; max-width:425px;
    margin-top:10px; color:#71767b; font-size:13px; }
  .tweet-actions span { display:flex; align-items:center; gap:6px; }
  .tweet-actions svg { width:18px; height:18px; fill:#71767b; }

  /* ---- right column ---- */
  .right-col { width:350px; padding:8px 24px; position:sticky; top:0;
    height:100vh; }
  .search-pill { display:flex; align-items:center; gap:10px;
    background:#202327; border-radius:9999px; padding:11px 16px;
    color:#71767b; }
  .search-pill svg { width:18px; height:18px; fill:#71767b; }
  .trends-card { margin-top:14px; background:#16181c; border-radius:16px;
    overflow:hidden; }
  .trends-card h2 { font-size:20px; font-weight:800; padding:12px 16px; }
  .trend { padding:10px 16px; }
  .trend:hover { background:#1d1f23; }
  .trend .cat { color:#71767b; font-size:13px; }
  .trend .topic { font-weight:700; margin-top:1px; }
  .trend .count { color:#71767b; font-size:13px; margin-top:1px; }

  @media (max-width: 1100px) { .right-col { display:none; } }
  @media (max-width: 760px)  { .nav-rail { width:72px; }
    .nav-item span, .btn-post { display:none; } }
</style>
</head>
<body>
<div class="app">

  <nav class="nav-rail">
    <a class="nav-logo" href="/" aria-label="X">
      <svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
    </a>
    <a class="nav-item active" href="#"><svg viewBox="0 0 24 24"><path d="M21.591 7.146L12.52 1.157c-.316-.21-.724-.21-1.04 0l-9.071 5.99c-.26.173-.409.456-.409.757v13.183c0 .502.418.913.929.913H9.14c.51 0 .929-.41.929-.913v-7.075h3.909v7.075c0 .502.417.913.928.913h6.165c.511 0 .929-.41.929-.913V7.904c0-.301-.158-.584-.409-.758z"/></svg><span>Home</span></a>
    <a class="nav-item" href="#"><svg viewBox="0 0 24 24"><path d="M10.25 3.75c-3.59 0-6.5 2.91-6.5 6.5s2.91 6.5 6.5 6.5c1.795 0 3.419-.726 4.596-1.904 1.178-1.177 1.904-2.801 1.904-4.596 0-3.59-2.91-6.5-6.5-6.5zm-8.5 6.5c0-4.694 3.806-8.5 8.5-8.5s8.5 3.806 8.5 8.5c0 1.986-.682 3.815-1.824 5.262l4.781 4.781-1.414 1.414-4.781-4.781c-1.447 1.142-3.276 1.824-5.262 1.824-4.694 0-8.5-3.806-8.5-8.5z"/></svg><span>Explore</span></a>
    <a class="nav-item" href="#"><svg viewBox="0 0 24 24"><path d="M19.993 9.042C19.48 5.017 16.054 2 11.996 2s-7.49 3.021-7.999 7.051L2.866 18H7.1c.463 2.282 2.481 4 4.9 4s4.437-1.718 4.9-4h4.236l-1.143-8.958zM12 20c-1.306 0-2.417-.835-2.829-2h5.658c-.412 1.165-1.523 2-2.829 2zm-6.866-4l.847-6.698C6.364 6.272 8.941 4 11.996 4s5.627 2.268 6.013 5.295L18.864 16H5.134z"/></svg><span>Notifications</span></a>
    <a class="nav-item" href="#"><svg viewBox="0 0 24 24"><path d="M1.998 5.5c0-1.381 1.119-2.5 2.5-2.5h15c1.381 0 2.5 1.119 2.5 2.5v13c0 1.381-1.119 2.5-2.5 2.5h-15c-1.381 0-2.5-1.119-2.5-2.5v-13zm2.5-.5c-.276 0-.5.224-.5.5v2.764l8 3.638 8-3.636V5.5c0-.276-.224-.5-.5-.5h-15zm15.5 5.463l-8 3.636-8-3.638V18.5c0 .276.224.5.5.5h15c.276 0 .5-.224.5-.5v-8.037z"/></svg><span>Messages</span></a>
    <a class="nav-item" href="#"><svg viewBox="0 0 24 24"><path d="M5.651 19h12.698c-.337-1.8-1.023-3.21-1.945-4.19C15.318 13.65 13.838 13 12 13s-3.317.65-4.404 1.81c-.922.98-1.608 2.39-1.945 4.19zm.486-5.56C7.627 11.85 9.648 11 12 11s4.373.85 5.863 2.44c1.477 1.58 2.366 3.8 2.632 6.46l.11 1.1H3.395l.11-1.1c.266-2.66 1.155-4.88 2.632-6.46zM12 4c-1.105 0-2 .9-2 2s.895 2 2 2 2-.9 2-2-.895-2-2-2zM8 6c0-2.21 1.791-4 4-4s4 1.79 4 4-1.791 4-4 4-4-1.79-4-4z"/></svg><span>Profile</span></a>
    <button class="btn-post" type="button">Post</button>
  </nav>

  <main class="timeline">
    <header class="home-header">Home</header>

    <div class="compose">
      <div class="avatar" style="background:#7856ff">U</div>
      <div class="compose-body">
        <textarea id="compose-text" placeholder="What's happening?" maxlength="280" rows="2"></textarea>
        <div class="compose-actions">
          <button id="compose-post" type="button" disabled>Post</button>
        </div>
      </div>
    </div>

    <div id="feed"></div>
  </main>

  <aside class="right-col">
    <div class="search-pill">
      <svg viewBox="0 0 24 24"><path d="M10.25 3.75c-3.59 0-6.5 2.91-6.5 6.5s2.91 6.5 6.5 6.5c1.795 0 3.419-.726 4.596-1.904 1.178-1.177 1.904-2.801 1.904-4.596 0-3.59-2.91-6.5-6.5-6.5zm-8.5 6.5c0-4.694 3.806-8.5 8.5-8.5s8.5 3.806 8.5 8.5c0 1.986-.682 3.815-1.824 5.262l4.781 4.781-1.414 1.414-4.781-4.781c-1.447 1.142-3.276 1.824-5.262 1.824-4.694 0-8.5-3.806-8.5-8.5z"/></svg>
      <span>Search</span>
    </div>
    <div class="trends-card">
      <h2>What&#8217;s happening</h2>
      <div class="trend"><div class="cat">Technology · Trending</div><div class="topic">#LoadBalancing</div><div class="count">18.2K posts</div></div>
      <div class="trend"><div class="cat">Programming · Trending</div><div class="topic">Python stdlib</div><div class="count">9,431 posts</div></div>
      <div class="trend"><div class="cat">Trending</div><div class="topic">Round Robin</div><div class="count">5,102 posts</div></div>
    </div>
  </aside>

</div>

<script>
"use strict";

const ICONS = {
  reply: '<svg viewBox="0 0 24 24"><path d="M1.751 10c0-4.42 3.584-8 8.005-8h4.366c4.49 0 8.129 3.64 8.129 8.13 0 2.96-1.607 5.68-4.196 7.11l-8.054 4.46v-3.69h-.067c-4.49.1-8.183-3.51-8.183-8.01zm8.005-6c-3.317 0-6.005 2.69-6.005 6 0 3.37 2.77 6.08 6.138 6.01l.351-.01h1.761v2.3l5.087-2.81c1.951-1.08 3.163-3.13 3.163-5.36 0-3.39-2.744-6.13-6.129-6.13H9.756z"/></svg>',
  retweet: '<svg viewBox="0 0 24 24"><path d="M4.5 3.88l4.432 4.14-1.364 1.46L5.5 7.55V16c0 1.1.896 2 2 2H13v2H7.5c-2.209 0-4-1.79-4-4V7.55L1.432 9.48.068 8.02 4.5 3.88zM16.5 6H11V4h5.5c2.209 0 4 1.79 4 4v8.45l2.068-1.93 1.364 1.46-4.432 4.14-4.432-4.14 1.364-1.46 2.068 1.93V8c0-1.1-.896-2-2-2z"/></svg>',
  like: '<svg viewBox="0 0 24 24"><path d="M16.697 5.5c-1.222-.06-2.679.51-3.89 2.16l-.805 1.09-.806-1.09C9.984 6.01 8.526 5.44 7.304 5.5c-1.243.07-2.349.78-2.91 1.91-.552 1.12-.633 2.78.479 4.82 1.074 1.97 3.257 4.27 7.129 6.61 3.87-2.34 6.052-4.64 7.126-6.61 1.111-2.04 1.03-3.7.477-4.82-.561-1.13-1.666-1.84-2.908-1.91zm4.187 7.69c-1.351 2.48-4.001 5.12-8.379 7.67l-.503.3-.504-.3c-4.379-2.55-7.029-5.19-8.382-7.67-1.36-2.5-1.41-4.86-.514-6.67.887-1.79 2.647-2.91 4.601-3.01 1.651-.09 3.368.56 4.798 2.01 1.429-1.45 3.146-2.1 4.796-2.01 1.954.1 3.714 1.22 4.601 3.01.896 1.81.846 4.17-.514 6.67z"/></svg>',
  views: '<svg viewBox="0 0 24 24"><path d="M8.75 21V3h2v18h-2zM18 21V8.5h2V21h-2zM4 21l.004-10h2L6 21H4zm9.248 0v-7h2v7h-2z"/></svg>'
};

function fmt(n) {
  if (n >= 1000000) return (n / 1000000).toFixed(1).replace(/\.0$/, "") + "M";
  if (n >= 1000) return (n / 1000).toFixed(1).replace(/\.0$/, "") + "K";
  return String(n);
}

function esc(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

function renderTweet(t) {
  const initial = (t.name || "?").charAt(0).toUpperCase();
  const views = (t.replies + t.retweets + t.likes) * 7;
  return '<article class="tweet">' +
    '<div class="avatar" style="background:' + esc(t.avatar_color) + '">' + esc(initial) + '</div>' +
    '<div class="tweet-main">' +
      '<div class="tweet-head"><span class="tweet-name">' + esc(t.name) + '</span>' +
      '<span class="tweet-meta">@' + esc(t.handle) + ' · ' + esc(t.ts) + '</span></div>' +
      '<div class="tweet-text">' + esc(t.text) + '</div>' +
      '<div class="tweet-actions">' +
        '<span>' + ICONS.reply + fmt(t.replies) + '</span>' +
        '<span>' + ICONS.retweet + fmt(t.retweets) + '</span>' +
        '<span>' + ICONS.like + fmt(t.likes) + '</span>' +
        '<span>' + ICONS.views + fmt(views) + '</span>' +
      '</div>' +
    '</div></article>';
}

async function loadTimeline() {
  try {
    const res = await fetch("/api/timeline");
    const data = await res.json();
    document.getElementById("feed").innerHTML =
      (data.tweets || []).map(renderTweet).join("");
  } catch (e) {
    document.getElementById("feed").innerHTML =
      '<div style="padding:16px;color:#71767b">Could not load timeline.</div>';
  }
}

const composeText = document.getElementById("compose-text");
const composeBtn = document.getElementById("compose-post");

composeText.addEventListener("input", () => {
  composeBtn.disabled = composeText.value.trim().length === 0;
});

composeBtn.addEventListener("click", async () => {
  const text = composeText.value.trim();
  if (!text) return;
  composeBtn.disabled = true;
  try {
    await fetch("/api/tweets", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text: text })
    });
    composeText.value = "";
    await loadTimeline();
  } catch (e) { /* keep text for retry */ }
  composeBtn.disabled = composeText.value.trim().length === 0;
});

loadTimeline();
</script>
</body>
</html>
